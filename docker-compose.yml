services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: justclick-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: justclick
      POSTGRES_PASSWORD: justclick_dev
      POSTGRES_DB: justclick
    ports:
      - "5437:5432"
    volumes:
      - justclick_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U justclick -d justclick"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  justclick_pgdata:
