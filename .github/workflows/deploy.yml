name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ---------- FRONTEND ----------
      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: http://102.204.206.147
        run: npm run build

      # ---------- BACKEND ----------
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build backend
        working-directory: backend
        run: npm run build

      # ---------- DEPLOY FRONTEND ----------
      - name: Deploy frontend dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "dist/*"
          target: "/var/www/app/dist"
          strip_components: 1
          overwrite: true
          rm: true

      # ---------- DEPLOY BACKEND ----------
      - name: Deploy backend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "backend/dist/*,backend/package.json,backend/package-lock.json,backend/prisma/*"
          target: "/var/www/app/backend"
          strip_components: 1
          overwrite: true

      - name: Install backend deps & migrate & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /var/www/app/backend

            # Write .env from GitHub secrets
            cat > .env << EOF
            NODE_ENV=production
            PORT=4000
            API_URL=http://102.204.206.147
            CORS_ORIGIN=http://102.204.206.147
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=7d
            BCRYPT_SALT_ROUNDS=12
            STORAGE_DIR=/var/www/app/backend/storage
            STORAGE_PUBLIC_URL=http://102.204.206.147/api/storage
            MAX_FILE_SIZE_MB=100
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            GOOGLE_VISION_API_KEY=${{ secrets.GOOGLE_VISION_API_KEY }}
            PDFREST_API_KEY=${{ secrets.PDFREST_API_KEY }}
            DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY }}
            SEED_ADMIN_EMAIL=${{ secrets.SEED_ADMIN_EMAIL }}
            SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}
            EOF

            mkdir -p storage/documents storage/media storage/album-photos

            # Install all deps (including prisma CLI)
            npm ci
            npx prisma generate
            npx prisma migrate deploy

            # Run seed only if no admin user exists yet
            node -e "
              const { PrismaClient } = require('@prisma/client');
              const p = new PrismaClient();
              p.userRole.findFirst({ where: { role: 'admin' } })
                .then(r => { process.exit(r ? 1 : 0); })
                .catch(() => process.exit(1));
            " && npx tsx prisma/seed.ts || echo "Admin already exists, skipping seed"

            # Reload via PM2
            if pm2 describe app-api > /dev/null 2>&1; then
              pm2 reload app-api
            else
              pm2 start dist/index.js --name app-api --update-env
              pm2 save
            fi

            # Reload nginx
            nginx -t && systemctl reload nginx
