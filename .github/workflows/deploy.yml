name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, justclick-vps]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- FRONTEND ----------
      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: https://test.justclic.org
        run: npm run build

      - name: Deploy frontend to Nginx root
        run: |
          rm -rf /var/www/app/dist
          mkdir -p /var/www/app/dist
          cp -r dist/. /var/www/app/dist/

      # ---------- BACKEND ----------
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build backend TypeScript
        working-directory: backend
        run: npm run build

      - name: Deploy backend build
        run: |
          mkdir -p /var/www/app/backend
          # Sync code without touching storage folder or node_modules (reinstalled fresh)
          rsync -a --delete \
            --exclude='storage' \
            --exclude='node_modules' \
            --exclude='.env' \
            backend/ /var/www/app/backend/
          mkdir -p /var/www/app/backend/storage/documents \
                   /var/www/app/backend/storage/media \
                   /var/www/app/backend/storage/album-photos

      - name: Write .env with secrets
        run: |
          cat > /var/www/app/backend/.env << 'EOF'
          NODE_ENV=production
          PORT=4000
          API_URL=https://test.justclic.org
          CORS_ORIGIN=https://test.justclic.org,http://test.justclic.org,http://102.204.206.147
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=7d
          BCRYPT_SALT_ROUNDS=12
          STORAGE_DIR=/var/www/app/backend/storage
          STORAGE_PUBLIC_URL=https://test.justclic.org/api/storage
          MAX_FILE_SIZE_MB=100
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GOOGLE_VISION_API_KEY=${{ secrets.GOOGLE_VISION_API_KEY }}
          PDFREST_API_KEY=${{ secrets.PDFREST_API_KEY }}
          DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY }}
          PYTHON_BIN=/var/www/app/backend/.venv/bin/python
          EOF

      - name: Install production deps and run migrations
        working-directory: /var/www/app/backend
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy

      - name: Install PyMuPDF in venv (idempotent)
        run: |
          VENV=/var/www/app/backend/.venv
          if [ ! -x "$VENV/bin/python" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq python3-venv python3-pip
            python3 -m venv "$VENV"
            sudo chown -R "$USER" "$VENV" 2>/dev/null || true
          fi
          "$VENV/bin/pip" install --quiet --upgrade pip
          "$VENV/bin/python" -c "import fitz" 2>/dev/null || "$VENV/bin/pip" install --quiet pymupdf
          "$VENV/bin/python" -c "import fitz; print('pymupdf', fitz.__version__)"

      - name: Reload API via PM2
        working-directory: /var/www/app/backend
        run: |
          if sudo pm2 describe app-api > /dev/null 2>&1; then
            sudo pm2 reload app-api --update-env
          else
            sudo pm2 start dist/index.js --name app-api --update-env
            sudo pm2 save
          fi

      - name: Reload Nginx
        run: sudo systemctl reload nginx
