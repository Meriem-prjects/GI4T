name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, justclick-vps]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- FRONTEND ----------
      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: https://test.justclic.org
        run: npm run build

      - name: Deploy frontend to Nginx root
        run: |
          rm -rf /var/www/app/dist
          mkdir -p /var/www/app/dist
          cp -r dist/. /var/www/app/dist/

      # ---------- BACKEND ----------
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build backend TypeScript
        working-directory: backend
        run: npm run build

      - name: Deploy backend build
        run: |
          mkdir -p /var/www/app/backend
          # Sync code without touching storage folder or node_modules (reinstalled fresh)
          rsync -a --delete \
            --exclude='storage' \
            --exclude='node_modules' \
            --exclude='.env' \
            backend/ /var/www/app/backend/
          mkdir -p /var/www/app/backend/storage/documents \
                   /var/www/app/backend/storage/media \
                   /var/www/app/backend/storage/album-photos

      - name: Write .env with secrets
        run: |
          cat > /var/www/app/backend/.env << 'EOF'
          NODE_ENV=production
          PORT=4000
          API_URL=https://test.justclic.org
          CORS_ORIGIN=https://test.justclic.org,http://test.justclic.org,http://102.204.206.147
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=7d
          BCRYPT_SALT_ROUNDS=12
          STORAGE_DIR=/var/www/app/backend/storage
          STORAGE_PUBLIC_URL=https://test.justclic.org/api/storage
          MAX_FILE_SIZE_MB=100
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GOOGLE_VISION_API_KEY=${{ secrets.GOOGLE_VISION_API_KEY }}
          PDFREST_API_KEY=${{ secrets.PDFREST_API_KEY }}
          DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY }}
          PYTHON_BIN=python3
          PYTHONPATH=/var/www/app/backend/python_lib
          EOF

      - name: Install production deps and run migrations
        working-directory: /var/www/app/backend
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy

      - name: Sync ad-hoc schema additions (idempotent)
        working-directory: /var/www/app/backend
        run: |
          DB_URL=$(grep '^DATABASE_URL=' .env | cut -d= -f2- | tr -d '"' | sed 's/?.*$//')
          psql "$DB_URL" <<'SQL'
          ALTER TABLE documents
            ADD COLUMN IF NOT EXISTS legal_problem text,
            ADD COLUMN IF NOT EXISTS legal_problem_ar text,
            ADD COLUMN IF NOT EXISTS proposed_solution text,
            ADD COLUMN IF NOT EXISTS proposed_solution_ar text,
            ADD COLUMN IF NOT EXISTS ruling text,
            ADD COLUMN IF NOT EXISTS ruling_ar text,
            ADD COLUMN IF NOT EXISTS observations text,
            ADD COLUMN IF NOT EXISTS observations_ar text,
            ADD COLUMN IF NOT EXISTS introduction text,
            ADD COLUMN IF NOT EXISTS introduction_ar text,
            ADD COLUMN IF NOT EXISTS conclusion text,
            ADD COLUMN IF NOT EXISTS conclusion_ar text,
            ADD COLUMN IF NOT EXISTS sections jsonb;
          SQL

      - name: Install PyMuPDF to shared path (no sudo)
        run: |
          PY_LIB=/var/www/app/backend/python_lib
          mkdir -p "$PY_LIB"
          if PYTHONPATH="$PY_LIB" python3 -c "import fitz" 2>/dev/null; then
            echo "pymupdf already installed"
          else
            # Bootstrap a pip that doesn't require root
            BOOT=$(mktemp -d)
            curl -fsSL https://bootstrap.pypa.io/get-pip.py -o "$BOOT/get-pip.py"
            python3 "$BOOT/get-pip.py" --no-warn-script-location --target "$BOOT/pip-tools" >/dev/null
            PYTHONPATH="$BOOT/pip-tools" python3 -m pip install --quiet --target "$PY_LIB" pymupdf
            rm -rf "$BOOT"
          fi
          PYTHONPATH="$PY_LIB" python3 -c "import fitz; print('pymupdf', fitz.__version__)"
        continue-on-error: true

      - name: Reload API via PM2
        working-directory: /var/www/app/backend
        run: |
          if sudo pm2 describe app-api > /dev/null 2>&1; then
            sudo pm2 reload app-api --update-env
          else
            sudo pm2 start dist/index.js --name app-api --update-env
            sudo pm2 save
          fi

      - name: Reload Nginx
        run: sudo systemctl reload nginx
