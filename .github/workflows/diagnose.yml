name: Diagnose

on:
  workflow_dispatch:
    inputs:
      lines:
        description: 'Number of PM2 log lines to fetch'
        required: false
        default: '300'

jobs:
  diagnose:
    runs-on: [self-hosted, linux, justclick-vps]
    steps:
      - name: PM2 status
        run: sudo pm2 status

      - name: PM2 logs (last N lines)
        run: sudo pm2 logs app-api --lines ${{ github.event.inputs.lines }} --nostream || true

      - name: Latest documents
        run: |
          DB_URL=$(grep '^DATABASE_URL=' /var/www/app/backend/.env | cut -d= -f2- | tr -d '"' | sed 's/?.*$//')
          psql "$DB_URL" \
            -c "SELECT id, LEFT(title, 30) AS title, LEFT(title_ar, 30) AS title_ar, LENGTH(content) AS len_c, LENGTH(summary) AS len_s, LENGTH(summary_ar) AS len_sar, array_length(keywords,1) AS kw, array_length(keywords_ar,1) AS kw_ar, status, language FROM documents ORDER BY created_at DESC LIMIT 6;" || true

      - name: Sample latest doc full JSON via API
        run: |
          DOC_ID=$(psql "$(grep '^DATABASE_URL=' /var/www/app/backend/.env | cut -d= -f2- | tr -d '"' | sed 's/?.*$//')" -t -A -c "SELECT id FROM documents ORDER BY created_at DESC LIMIT 1;")
          echo "Latest doc ID: $DOC_ID"
          curl -sS "http://127.0.0.1:4000/api/documents/$DOC_ID" | python3 -c "import sys, json; d=json.load(sys.stdin); print(json.dumps({k:(v if not isinstance(v,str) or len(v)<80 else v[:80]+'...') for k,v in d.items() if not isinstance(v, (list, dict)) or k in ('keywords','keywordsAr')}, ensure_ascii=False, indent=2))" || true

      - name: Structured fields per recent doc (intro / sections / conclusion)
        run: |
          DB_URL=$(grep '^DATABASE_URL=' /var/www/app/backend/.env | cut -d= -f2- | tr -d '"' | sed 's/?.*$//')
          psql "$DB_URL" \
            -c "SELECT id, LEFT(introduction_ar,40) AS intro_ar, LEFT(conclusion_ar,40) AS conclu_ar, LEFT(legal_problem_ar,40) AS lp_ar, LEFT(proposed_solution_ar,40) AS ps_ar, LEFT(ruling_ar,40) AS rul_ar, jsonb_array_length(sections) AS nb_sec FROM documents ORDER BY created_at DESC LIMIT 6;" || true

      - name: Latest sections JSONB shape
        run: |
          DB_URL=$(grep '^DATABASE_URL=' /var/www/app/backend/.env | cut -d= -f2- | tr -d '"' | sed 's/?.*$//')
          psql "$DB_URL" -c "SELECT id, jsonb_pretty(sections) FROM documents WHERE sections IS NOT NULL ORDER BY created_at DESC LIMIT 1;" || true

      - name: Latest processing jobs
        run: |
          DB_URL=$(grep '^DATABASE_URL=' /var/www/app/backend/.env | cut -d= -f2- | tr -d '"' | sed 's/?.*$//')
          psql "$DB_URL" \
            -c "SELECT id, file_name, status, current_step, LEFT(error_message, 400) AS error, created_at FROM processing_jobs ORDER BY created_at DESC LIMIT 6;" || true

      - name: Backend node_modules check
        working-directory: /var/www/app/backend
        run: |
          ls -d node_modules/pdf-to-png-converter 2>/dev/null && echo "pdf-to-png-converter installed" || echo "MISSING pdf-to-png-converter"
          ls -d node_modules/pdf-parse 2>/dev/null && echo "pdf-parse installed" || echo "MISSING pdf-parse"
          PYTHONPATH=/var/www/app/backend/python_lib python3 -c "import fitz; print('pymupdf', fitz.__version__)" 2>&1 || echo "MISSING pymupdf"
          node -e "import('openai/version.js').then(m => console.log('openai version:', m.VERSION)).catch(() => console.log('openai version check skipped'))"

      - name: Test PyMuPDF script on most recent PDF
        run: |
          PDF=$(ls -t /var/www/app/backend/storage/documents/*/*.pdf 2>/dev/null | head -1)
          echo "Testing on: $PDF"
          if [ -n "$PDF" ]; then
            PYTHONPATH=/var/www/app/backend/python_lib python3 /var/www/app/backend/scripts/arabic_pdf_transcribe.py "$PDF" ar 2>&1 | head -c 800
            echo ""
            echo "--- end of preview ---"
          fi
